name: Compile LaTeX Thesis

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full latexmk

      - name: Generate class files
        run: xelatex heuthesis.ins

      - name: Build bachelor thesis
        working-directory: examples/book/bachelor
        run: latexmk -xelatex -interaction=nonstopmode -halt-on-error main.tex

      - name: Build bachelor midterm report
        working-directory: examples/art/reports
        run: latexmk -xelatex -interaction=nonstopmode -halt-on-error report.tex

      - name: Upload thesis PDF
        uses: actions/upload-artifact@v4
        with:
          name: bachelor-thesis-pdf
          path: examples/book/bachelor/main.pdf

      - name: Upload report PDF
        uses: actions/upload-artifact@v4
        with:
          name: bachelor-midterm-report-pdf
          path: examples/art/reports/report.pdf

      - name: Create release and upload PDFs
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            examples/book/bachelor/main.pdf
            examples/art/reports/report.pdf
